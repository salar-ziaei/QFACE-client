<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QFACE Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      padding: 24px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    h2 { color: #333; margin-bottom: 20px; font-size: 18px; }
    .field { margin-bottom: 14px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 4px; }
    input {
      width: 100%; padding: 8px 12px;
      border: 1px solid #ccc; border-radius: 6px;
      font-size: 13px; outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #667eea; }
    .hint { font-size: 11px; color: #999; margin-top: 3px; }
    .error { color: #e53e3e; font-size: 12px; margin-top: 3px; display: none; }
    .divider { border: none; border-top: 1px solid #e0e0e0; margin: 18px 0; }
    .button-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
    button {
      padding: 8px 22px; border: none; border-radius: 6px;
      cursor: pointer; font-weight: 600; font-size: 14px;
      transition: background 0.15s;
    }
    .btn-save    { background: #667eea; color: white; }
    .btn-save:hover { background: #5a6fd6; }
    .btn-cancel  { background: #e0e0e0; color: #333; }
    .btn-cancel:hover { background: #d0d0d0; }
  </style>
</head>
<body>
  <h2>⚙️ QFACE Settings</h2>

  <div class="field">
    <label for="dashboardUrl">Dashboard URL</label>
    <input type="text" id="dashboardUrl" placeholder="http://localhost:8080">
    <div class="hint">Opened when you click the 📊 button</div>
    <div class="error" id="err-dashboard">Enter a valid URL</div>
  </div>

  <hr class="divider">

  <div class="button-row">
    <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
    <button class="btn-save"   onclick="saveSettings()">Save</button>
  </div>

  <script>
    function isValidUrl(str) {
      try { new URL(str); return true; } catch { return false; }
    }

    window.electronAPI.getConfig().then(config => {
      document.getElementById('dashboardUrl').value = config.dashboardUrl || '';
    });

    function saveSettings() {
      const dashboardUrl = document.getElementById('dashboardUrl').value.trim();

      let valid = true;
      const pairs = [
        [dashboardUrl, 'err-dashboard'],
      ];
      pairs.forEach(([url, errId]) => {
        const el = document.getElementById(errId);
        if (!isValidUrl(url)) { el.style.display = 'block'; valid = false; }
        else el.style.display = 'none';
      });

      if (!valid) return;
      window.electronAPI.saveConfig({ dashboardUrl });
      closeSettings();
    }

    function closeSettings() {
      window.electronAPI.closeSettings();
    }

    // Save on Enter
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') saveSettings();
      if (e.key === 'Escape') closeSettings();
    });
  </script>
</body>
</html>
